[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
numReplicas = 1
sleepApplication = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.healthcheck]
path = "/ping"
interval = 60
timeout = 30
retries = 10

[deploy.env]
PORT = "8080"

[service]
name = "multasgo"
start = "bash start.sh"

[env]
PORT = "8080"