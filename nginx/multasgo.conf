# =============================================================================
# MultasGO - Nginx Reverse Proxy (Produção)
# /etc/nginx/sites-available/multasgo
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=search:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

# Upstream backend
upstream multasgo_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

# --- HTTP: Redireciona TUDO para HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name multasgo.com.br www.multasgo.com.br;

    # Certbot challenge (necessário para renovação)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirecionar para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: Servidor principal ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name multasgo.com.br www.multasgo.com.br;

    # ------------------------------------------------------------------
    # SSL/TLS
    # ------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/multasgo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/multasgo.com.br/privkey.pem;

    # Protocolos seguros (TLS 1.2+ apenas)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Sessão SSL (performance)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ------------------------------------------------------------------
    # Security Headers
    # ------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'" always;

    # Esconder versão do Nginx
    server_tokens off;

    # ------------------------------------------------------------------
    # Limites
    # ------------------------------------------------------------------
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ------------------------------------------------------------------
    # Gzip
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ------------------------------------------------------------------
    # Arquivos estáticos (servidos direto pelo Nginx)
    # ------------------------------------------------------------------
    location /static/ {
        alias /var/www/multasgo/app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security_headers_multasgo.conf;

        # Desabilitar acesso a dotfiles
        location ~ /\. {
            deny all;
            return 404;
        }
    }

    # Favicon
    location = /favicon.ico {
        alias /var/www/multasgo/app/static/img/favicon.ico;
        expires 30d;
        access_log off;
        log_not_found off;
    }

    # robots.txt (se existir)
    location = /robots.txt {
        alias /var/www/multasgo/app/static/robots.txt;
        access_log off;
        log_not_found off;
    }

    # ------------------------------------------------------------------
    # API de busca (rate limit mais restritivo)
    # ------------------------------------------------------------------
    location /api/v1/infracoes/pesquisa {
        limit_req zone=search burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://multasgo_backend;
        include /etc/nginx/snippets/proxy_params_multasgo.conf;
    }

    location /api/v1/infracoes/smart {
        limit_req zone=search burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://multasgo_backend;
        include /etc/nginx/snippets/proxy_params_multasgo.conf;
    }

    location /api/v1/infracoes/autocomplete {
        limit_req zone=api burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://multasgo_backend;
        include /etc/nginx/snippets/proxy_params_multasgo.conf;
    }

    # ------------------------------------------------------------------
    # API geral
    # ------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://multasgo_backend;
        include /etc/nginx/snippets/proxy_params_multasgo.conf;
    }

    # Health check (sem rate limit)
    location = /health {
        proxy_pass http://multasgo_backend;
        include /etc/nginx/snippets/proxy_params_multasgo.conf;
        access_log off;
    }

    # ------------------------------------------------------------------
    # Frontend (páginas HTML)
    # ------------------------------------------------------------------
    location / {
        limit_req zone=general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://multasgo_backend;
        include /etc/nginx/snippets/proxy_params_multasgo.conf;

        # Cache de páginas HTML no browser
        add_header Cache-Control "no-cache, must-revalidate";
        include /etc/nginx/snippets/security_headers_multasgo.conf;
    }

    # ------------------------------------------------------------------
    # Bloquear acesso a arquivos sensíveis
    # ------------------------------------------------------------------
    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    location ~ /(logs|__pycache__|teste)/ {
        deny all;
        return 404;
    }

    # ------------------------------------------------------------------
    # Error pages
    # ------------------------------------------------------------------
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 429 '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>MultasGO - Limite de requisições</title><style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f5f5f5}div{text-align:center;padding:2rem}h1{color:#e74c3c}p{color:#555}</style></head><body><div><h1>429</h1><p>Muitas requisições. Aguarde alguns segundos e tente novamente.</p><a href="/">Voltar ao início</a></div></body></html>';
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        default_type text/html;
        return 503 '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>MultasGO - Manutenção</title><style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f5f5f5}div{text-align:center;padding:2rem}h1{color:#e67e22}p{color:#555}</style></head><body><div><h1>Manutenção</h1><p>O MultasGO está temporariamente indisponível. Tente novamente em alguns instantes.</p></div></body></html>';
    }
}
